<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>KD152 Horse Lookup</title>
<link rel="manifest" href="manifest.json">
<style>
  /* ── TOKENS ── */
  :root {
    --gold:       #BE965B;
    --red:        #DD0131;
    --oaks-pink:  #D4006C;
    --black:      #0a0a0a;
    --panel:      #181818;
    --border:     #2a2a2a;
    --text:       #f0f0f0;
    --text-muted: #888;
    --white:      #ffffff;
    --radius:     12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header img#header-logo {
    height: 52px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }
  .header-text { flex: 1; }
  .header-text h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .admin-toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 1.1rem;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .admin-toggle-btn:active { background: var(--border); }

  /* ── ADMIN BANNER ── */
  .admin-banner {
    display: none;
    background: #7c2d12;
    color: #fed7aa;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px;
    letter-spacing: 0.05em;
  }
  body.admin-mode .admin-banner { display: block; }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tab.active-derby { color: var(--gold); border-bottom-color: var(--gold); }
  .tab.active-oaks  { color: var(--oaks-pink); border-bottom-color: var(--oaks-pink); }

  /* ── SEARCH ── */
  .search-wrap { padding: 12px 14px 8px; }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 12px;
    gap: 8px;
  }
  .search-box svg { color: var(--text-muted); flex-shrink: 0; }
  .search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 1rem;
    padding: 12px 0;
    font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text-muted); }

  /* ── RESULT COUNT ── */
  .result-meta {
    padding: 4px 14px 8px;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ── HORSE LIST ── */
  #horse-list { padding: 0 12px; }

  /* ── HORSE CARD ── */
  .horse-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .horse-card.expanded { border-color: var(--gold); }

  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
  }
  .pp-badge {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .pp-badge.has-pp {
    background: #1a0a00;
    border-color: var(--gold);
    color: var(--gold);
  }
  .card-name-block { flex: 1; min-width: 0; }
  .horse-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .horse-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .barn-pill {
    background: #1a1200;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chevron {
    color: var(--text-muted);
    font-size: 0.8rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .horse-card.expanded .chevron { transform: rotate(180deg); }

  /* ── EXPANDED DETAIL ── */
  .card-detail {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .horse-card.expanded .card-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .detail-item.full-width { grid-column: 1 / -1; }
  .detail-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 3px;
    font-weight: 600;
  }
  .detail-value {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.35;
  }
  .detail-value.null-val { color: var(--text-muted); font-style: italic; }

  /* Admin edit button */
  .edit-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 6px;
    vertical-align: middle;
  }
  body.admin-mode .edit-btn { display: inline; }
  .edit-btn:active { background: var(--border); }

  /* ── RECORD PILLS ── */
  .record-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .record-pill {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.78rem;
    text-align: center;
  }
  .record-pill .rp-label {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
  }
  .record-pill .rp-val {
    font-weight: 700;
    color: var(--gold);
    font-size: 0.95rem;
  }

  /* ── QUOTES ── */
  .quotes-section { margin-top: 14px; }
  .quote-item {
    border-left: 3px solid var(--gold);
    padding: 6px 10px;
    margin-bottom: 8px;
    background: #111;
    border-radius: 0 6px 6px 0;
  }
  .quote-text {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.45;
    font-style: italic;
  }
  .quote-source {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 600;
  }

  /* ── COPY BUTTON ── */
  .copy-btn {
    width: 100%;
    margin-top: 14px;
    background: #1a0a00;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.03em;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:active, .copy-btn.copied { background: #2a1500; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; font-style: italic; }

  /* ── OAKS THEME ── */
  body.oaks-mode .horse-card.expanded     { border-color: var(--oaks-pink); }
  body.oaks-mode .detail-label           { color: var(--oaks-pink); }
  body.oaks-mode .pp-badge.has-pp        { background: #2d0a1e; border-color: var(--oaks-pink); color: var(--oaks-pink); }
  body.oaks-mode .barn-pill              { background: #2d0a1e; border-color: var(--oaks-pink); color: var(--oaks-pink); }
  body.oaks-mode .record-pill .rp-val    { color: var(--oaks-pink); }
  body.oaks-mode .quote-item             { border-left-color: var(--oaks-pink); }
  body.oaks-mode .copy-btn              { background: #2d0a1e; border-color: var(--oaks-pink); color: var(--oaks-pink); }
  body.oaks-mode .copy-btn:active       { background: #3d1030; }
  body.oaks-mode .modal h3              { color: var(--oaks-pink); }
  body.oaks-mode .modal-btn.primary     { background: var(--oaks-pink); }
  body.oaks-mode .pin-dot.filled        { background: var(--oaks-pink); border-color: var(--oaks-pink); }

  /* ── PIN MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    width: min(320px, 90vw);
    text-align: center;
  }
  .modal h3 {
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .modal p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; }
  .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; }
  .pin-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .pin-key {
    background: #222;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.2rem;
    font-weight: 600;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .pin-key:active { background: #333; }
  .pin-key.pin-back { font-size: 1rem; color: var(--text-muted); }
  .pin-error {
    color: var(--red);
    font-size: 0.78rem;
    text-align: center;
    margin-top: 6px;
    min-height: 18px;
  }
  .modal-btn {
    width: 100%;
    margin-top: 14px;
    padding: 11px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn.secondary { background: var(--border); color: var(--text-muted); }

  /* ── EDIT MODAL ── */
  .edit-modal { width: min(340px, 90vw); text-align: left; }
  .edit-modal h3 { margin-bottom: 16px; }
  .edit-modal input, .edit-modal textarea {
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 10px 12px;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
  }
  .edit-modal input:focus, .edit-modal textarea:focus { border-color: var(--gold); }
  .edit-modal textarea { resize: vertical; min-height: 80px; }
  .edit-actions { display: flex; gap: 10px; }
  .edit-actions .modal-btn { margin-top: 0; flex: 1; }
  .modal-btn.primary { background: var(--gold); color: #1a0a00; }
  .modal-btn.danger  { background: #7f1d1d; color: #fca5a5; }

  /* ── EXPORT BANNER ── */
  .export-banner {
    display: none;
    position: fixed;
    bottom: 44px; left: 0; right: 0;
    background: #1a2e1a;
    border-top: 1px solid #2d4a2d;
    padding: 10px 16px;
    z-index: 200;
    align-items: center;
    gap: 10px;
  }
  body.admin-mode .export-banner { display: flex; }
  .export-banner span { flex: 1; font-size: 0.8rem; color: #86efac; }
  .export-btn {
    background: #166534;
    border: none;
    color: #dcfce7;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .export-btn:active { background: #14532d; }

  /* ── FOOTER ── */
  .last-updated {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--black);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-align: center;
    z-index: 50;
  }
</style>
</head>
<body>

<header>
  <img id="header-logo" src="" alt="KD152">
  <div class="header-text">
    <h1 id="header-title">Horse Lookup</h1>
    <p>Media Operations · Churchill Downs</p>
  </div>
  <button class="admin-toggle-btn" onclick="handleAdminToggle()" title="Admin mode">⚙</button>
</header>

<div class="admin-banner">⚙ Admin Mode — Tap ✏ to edit any field</div>

<div class="tab-bar">
  <div class="tab active-derby" id="tab-derby" onclick="switchRace('derby')">🌹 Kentucky Derby</div>
  <div class="tab" id="tab-oaks"  onclick="switchRace('oaks')">🌸 Kentucky Oaks</div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search by name, trainer, owner…" oninput="filterHorses()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<div class="result-meta" id="result-count"></div>
<div id="horse-list"></div>

<!-- PIN Modal -->
<div class="modal-overlay" id="pin-modal">
  <div class="modal">
    <h3>Admin Access</h3>
    <p>Enter your 4-digit PIN to enable editing</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key pin-back" onclick="pinBack()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key pin-back" onclick="pinCancel()" style="font-size:0.75rem">Cancel</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal edit-modal">
    <h3 id="edit-modal-title">Edit Field</h3>
    <input type="text" id="edit-input" style="display:none">
    <textarea id="edit-textarea" style="display:none"></textarea>
    <div class="edit-actions">
      <button class="modal-btn secondary" onclick="closeEdit()">Cancel</button>
      <button class="modal-btn primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Export Banner -->
<div class="export-banner">
  <span>Admin: export updated data for deploy_horses.py</span>
  <button class="export-btn" onclick="exportData()">📋 Copy JS Data</button>
</div>

<div class="last-updated" id="last-updated"></div>

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let currentRace  = 'derby';
let expandedCard = null;
let adminMode    = false;
let editTarget   = null;

// ════════════════════════════════════════════════════════════
// LOGO / THEME
// ════════════════════════════════════════════════════════════
function updateTheme(race) {
  const logo  = document.getElementById('header-logo');
  const title = document.getElementById('header-title');
  if (race === 'derby') {
    logo.src = 'data:image/png;base64,' + DERBY_LOGO_B64;
    title.textContent = 'Horse Lookup';
  } else {
    logo.src = 'data:image/png;base64,' + OAKS_LOGO_B64;
    title.textContent = 'Horse Lookup';
  }
}

// ════════════════════════════════════════════════════════════
// TAB / RACE SWITCHING
// ════════════════════════════════════════════════════════════
function switchRace(race) {
  currentRace = race;
  document.body.classList.toggle('oaks-mode', race === 'oaks');
  document.getElementById('tab-derby').className = 'tab' + (race === 'derby' ? ' active-derby' : '');
  document.getElementById('tab-oaks').className  = 'tab' + (race === 'oaks'  ? ' active-oaks'  : '');
  document.getElementById('search-input').value  = '';
  expandedCard = null;
  updateTheme(race);
  renderHorses(getHorses());
}

function getHorses() {
  return currentRace === 'derby' ? derbyHorses : oaksHorses;
}

// ════════════════════════════════════════════════════════════
// SEARCH / FILTER
// ════════════════════════════════════════════════════════════
function filterHorses() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const horses = getHorses();
  const filtered = q
    ? horses.filter(h =>
        h.name.toLowerCase().includes(q) ||
        (h.trainer && h.trainer.toLowerCase().includes(q)) ||
        (h.owner   && h.owner.toLowerCase().includes(q))   ||
        (h.breeder && h.breeder.toLowerCase().includes(q)) ||
        (h.barn    && String(h.barn).includes(q))
      )
    : horses;
  renderHorses(filtered);
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function renderHorses(horses) {
  const list  = document.getElementById('horse-list');
  const count = document.getElementById('result-count');

  count.textContent = `${horses.length} horse${horses.length !== 1 ? 's' : ''}`;

  if (!horses.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No horses match your search.</p></div>`;
    return;
  }

  list.innerHTML = horses.map((h, visIdx) => {
    const realIdx = getHorses().indexOf(h);
    const cardId  = `card-${realIdx}`;
    const isOpen  = expandedCard === cardId;
    const ppBadge = h.post
      ? `<div class="pp-badge has-pp">${h.post}</div>`
      : `<div class="pp-badge">—</div>`;
    const barnPill = h.barn
      ? `<div class="barn-pill">Barn ${h.barn}</div>`
      : '';
    const detail = buildDetail(h, realIdx);

    return `
    <div class="horse-card${isOpen ? ' expanded' : ''}" id="${cardId}" onclick="toggleCard('${cardId}')">
      <div class="card-header">
        ${ppBadge}
        <div class="card-name-block">
          <div class="horse-name">${h.name}</div>
          <div class="horse-sub">${h.trainer || 'Trainer TBD'} · ${h.owner || 'Owner TBD'}</div>
        </div>
        ${barnPill}
        <div class="chevron">▼</div>
      </div>
      <div class="card-detail">
        ${detail}
      </div>
    </div>`;
  }).join('');
}

function buildDetail(h, realIdx) {
  const eb = (field) => `<button class="edit-btn" onclick="openEdit(event,${realIdx},'${field}')">✏</button>`;
  const val = (v) => v ? v : '<span class="null-val">—</span>';

  const recordPills = `
    <div class="record-pills">
      <div class="record-pill"><span class="rp-label">Starts</span><span class="rp-val">${h.record.starts}</span></div>
      <div class="record-pill"><span class="rp-label">Wins</span><span class="rp-val">${h.record.wins}</span></div>
      <div class="record-pill"><span class="rp-label">2nd</span><span class="rp-val">${h.record.places}</span></div>
      <div class="record-pill"><span class="rp-label">3rd</span><span class="rp-val">${h.record.shows}</span></div>
    </div>`;

  const quotesHTML = h.quotes && h.quotes.length
    ? h.quotes.map(q => `
        <div class="quote-item">
          <div class="quote-text">"${q.text}"</div>
          <div class="quote-source">— ${q.source}</div>
        </div>`).join('')
    : `<div style="color:var(--text-muted);font-size:0.8rem;font-style:italic">No quotes available</div>`;

  return `
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-label">Post Position ${eb('pp')}</div>
        <div class="detail-value">${h.post ? `#${h.post}` : '<span class="null-val">TBD</span>'}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Barn ${eb('barn')}</div>
        <div class="detail-value">${h.barn ? `#${h.barn}` : '<span class="null-val">TBD</span>'}</div>
      </div>
      <div class="detail-item full-width">

        <div class="detail-label">Breeder / Farm ${eb('breeder')}</div>
        <div class="detail-value">${val(h.breeder)}</div>
      </div>
      <div class="detail-item full-width">
        <div class="detail-label">Career Record ${eb('record')}</div>

      <div class="detail-item full-width">

}

// ════════════════════════════════════════════════════════════
// TOGGLE CARD
// ════════════════════════════════════════════════════════════
function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (!card) return;
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    expandedCard = null;
  } else {
    if (expandedCard) {
      document.getElementById(expandedCard)?.classList.remove('expanded');
    }
    card.classList.add('expanded');
    expandedCard = cardId;
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
  }
}

// ════════════════════════════════════════════════════════════
// COPY TO CLIPBOARD
// ════════════════════════════════════════════════════════════
function copyHorseInfo(evt, realIdx) {
  evt.stopPropagation();
  const h = getHorses()[realIdx];
  const r = h.record;
  const lines = [
    `🐴 ${h.name}`,
    `Post: ${h.post ? '#' + h.post : 'TBD'}`,
    `Barn: ${h.barn ? '#' + h.barn : 'TBD'}`,
    `Trainer: ${h.trainer || 'TBD'}`,
    `Owner: ${h.owner || 'TBD'}`,
    `Breeder: ${h.breeder || 'TBD'}`,
    `Record: ${r.starts}sts ${r.wins}W ${r.places}P ${r.shows}S`,
    h.earnings ? `Earnings: ${h.earnings}` : '',
    h.notes ? `Note: ${h.notes}` : '',
  ].filter(Boolean).join('\n');

  const btn = document.getElementById(`copy-btn-${realIdx}`);
  const doBtn = (ok) => {
    if (ok) {
      btn.classList.add('copied');
      btn.innerHTML = '✅ Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '📋 Copy horse info to clipboard';
      }, 2400);
    }
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lines).then(() => doBtn(true)).catch(() => fallbackCopy(lines, doBtn));
  } else {
    fallbackCopy(lines, doBtn);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(true); } catch(e) { cb(false); }
  document.body.removeChild(ta);
}

// ════════════════════════════════════════════════════════════
// ADMIN — PIN
// ════════════════════════════════════════════════════════════
let pinBuffer = '';

function handleAdminToggle() {
  if (adminMode) {
    adminMode = false;
    document.body.classList.remove('admin-mode');
    return;
  }
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-modal').classList.add('open');
}

function pinKey(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 130);
}

function pinBack() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function pinCancel() {
  pinBuffer = '';
  document.getElementById('pin-modal').classList.remove('open');
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`dot-${i}`).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinBuffer === ADMIN_PIN) {
    document.getElementById('pin-modal').classList.remove('open');
    adminMode = true;
    document.body.classList.add('admin-mode');
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN — try again';
    pinBuffer = '';
    updatePinDots();
  }
}

// ════════════════════════════════════════════════════════════
// ADMIN — EDIT FIELD
// ════════════════════════════════════════════════════════════
const FIELD_META = {
  name:     'Horse Name',
  pp:       'Post Position (number only)',
  barn:     'Barn # (number only)',
  trainer:  'Trainer',
  owner:    'Owner',
  breeder:  'Breeder / Farm',
  earnings: 'Earnings (e.g. $1,234,567)',
  notes:    'Notable / Notes',
  record:   'Record  →  starts-wins-2nds-3rds  (e.g. 6-3-1-1)',
};

function openEdit(evt, realIdx, field) {
  evt.stopPropagation();
  if (!adminMode) return;
  const h = getHorses()[realIdx];
  editTarget = { realIdx, field };

  let cur = '';
  if (field === 'record') {
    const r = h.record;
    cur = `${r.starts}-${r.wins}-${r.places}-${r.shows}`;
  } else {
    cur = h[field] != null ? String(h[field]) : '';
  }

  const isLong = ['notes'].includes(field);
  document.getElementById('edit-modal-title').textContent = FIELD_META[field] || field;
  const inp = document.getElementById('edit-input');
  const ta  = document.getElementById('edit-textarea');
  if (isLong) {
    inp.style.display = 'none';
    ta.style.display  = 'block';
    ta.value = cur;
    setTimeout(() => ta.focus(), 100);
  } else {
    ta.style.display  = 'none';
    inp.style.display = 'block';
    inp.value = cur;
    setTimeout(() => { inp.focus(); inp.select(); }, 100);
  }
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  editTarget = null;
}

function saveEdit() {
  if (!editTarget) return;
  const { realIdx, field } = editTarget;
  const horses = getHorses();
  const h = horses[realIdx];
  const isLong = ['notes'].includes(field);
  const raw = isLong
    ? document.getElementById('edit-textarea').value.trim()
    : document.getElementById('edit-input').value.trim();

  if (field === 'record') {
    const parts = raw.split('-').map(Number);
    if (parts.length === 4 && parts.every(n => !isNaN(n))) {
      h.record = { starts: parts[0], wins: parts[1], places: parts[2], shows: parts[3] };
    }
  } else if (field === 'pp' || field === 'barn') {
    h[field] = raw ? Number(raw) : null;
  } else {
    h[field] = raw || null;
  }

  closeEdit();
  filterHorses();
}

// ADMIN — EXPORT DATA
// ════════════════════════════════════════════════════════════
function exportData() {
  const out = `// Paste this into index.html to replace derbyHorses and oaksHorses\n\nconst derbyHorses = ${JSON.stringify(derbyHorses, null, 2)};\n\nconst oaksHorses = ${JSON.stringify(oaksHorses, null, 2)};`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(out).then(() => alert('Data copied! Paste into index.html and run deploy_horses.py'));
  } else {
    fallbackCopy(out, () => alert('Data copied!'));
  }
}
